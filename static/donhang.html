<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#don_hang — Orders</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    position: sticky; top:0; z-index:10;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-size:18px; font-weight:600; }
  header a { color:#7eb8ff; text-decoration:none; font-size:13px; }
  .status { font-size:13px; color:#888; }
  main {
    max-width: 820px; margin:0 auto; padding:16px 20px 40px;
  }
  .card {
    background: #1e1e30;
    border-radius: 10px;
    padding: 14px 18px;
    border-left: 4px solid #facc15;
    margin-bottom: 10px;
    transition: background .2s;
  }
  .card .meta {
    display:flex; align-items:center; gap:10px;
    font-size:12px; color:#888; margin-bottom:6px;
  }
  .card .content {
    font-size:14px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word;
    color:#d0d0d0;
  }
  .card .content a { color:#7eb8ff; }
  mark {
    background:#facc15; color:#000; padding:1px 3px; border-radius:2px;
  }
  .empty { text-align:center; padding:60px 20px; color:#555; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .footer {
    text-align:center; padding:20px; color:#444; font-size:12px;
  }
  .load-more {
    display:block; width:100%; padding:12px; margin-top:10px;
    border-radius:8px; border:1px solid #333; background:#1e1e30;
    color:#ccc; cursor:pointer; font-size:14px; text-align:center;
  }
  .load-more:hover { background:#2a2a4a; }
  .summary {
    background:#1a2a1a; border:1px solid #2a4a2a; border-radius:8px;
    padding:12px 16px; margin-bottom:16px; font-size:13px; color:#a0d0a0;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📦 #don_hang — Orders</h1>
    <div style="font-size:12px;color:#666;margin-top:2px">Channel: -1002138495144</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="status" id="status-text">Loading...</span>
    <a href="/">← Saved Messages</a>
  </div>
</header>

<main id="feed">
  <div class="empty" id="empty">
    <div class="icon">📦</div>
    <div>Loading #don_hang...</div>
  </div>
</main>

<div class="footer">Telegram User API — #don_hang search</div>

<script>
const feed = document.getElementById('feed');
const statusText = document.getElementById('status-text');
const empty = document.getElementById('empty');

let offset = 0;
let hasMore = true;
let loading = false;
let totalLoaded = 0;

async function fetchBatch() {
  if (loading || !hasMore) return;
  loading = true;
  statusText.textContent = 'Loading...';

  try {
    const params = new URLSearchParams();
    if (offset) params.set('offset', offset);

    const res = await fetch(`/api/donhang?${params}`);
    const data = await res.json();

    if (data.error) {
      statusText.textContent = data.error;
      return;
    }

    if (empty) empty.remove();

    if (!data.results.length && totalLoaded === 0) {
      feed.innerHTML = '<div class="empty"><div class="icon">📭</div><div>No #don_hang messages found</div></div>';
      statusText.textContent = 'No results';
      hasMore = false;
      return;
    }

    data.results.forEach(msg => {
      const card = document.createElement('div');
      card.className = 'card';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const dateSpan = document.createElement('span');
      dateSpan.textContent = new Date(msg.date).toLocaleString();

      const idSpan = document.createElement('span');
      idSpan.textContent = `#${msg.id}`;
      idSpan.style.marginLeft = 'auto';

      meta.appendChild(dateSpan);
      meta.appendChild(idSpan);

      const content = document.createElement('div');
      content.className = 'content';

      // Highlight #don_hang occurrences
      let text = (msg.text || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      text = text.replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank">$1</a>');
      // Highlight #hashtags
      text = text.replace(/(#\w+)/g, '<mark>$1</mark>');
      content.innerHTML = text || (msg.media ? `📎 ${msg.media}` : '<i>empty</i>');

      card.appendChild(meta);
      card.appendChild(content);
      feed.appendChild(card);
      totalLoaded++;
    });

    hasMore = data.has_more;
    offset = data.next_offset;
    statusText.textContent = `${totalLoaded} loaded`;

    // Remove old "Load more" button
    const oldBtn = document.getElementById('load-more');
    if (oldBtn) oldBtn.remove();

    if (hasMore) {
      const btn = document.createElement('button');
      btn.id = 'load-more';
      btn.className = 'load-more';
      btn.textContent = 'Load more...';
      btn.addEventListener('click', fetchBatch);
      feed.appendChild(btn);

      // Also add intersection observer for auto-load
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) fetchBatch();
      });
      observer.observe(btn);
    } else {
      statusText.textContent = `${totalLoaded} total — all loaded`;
    }
  } catch (err) {
    statusText.textContent = 'Error: ' + err.message;
  } finally {
    loading = false;
  }
}

fetchBatch();
</script>
</body>
</html>
