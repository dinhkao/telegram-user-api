<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Messages — Live</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    position: sticky; top:0; z-index:10;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size:18px; font-weight:600; }
  .status { display:flex; align-items:center; gap:8px; font-size:13px; }
  .dot {
    width:8px; height:8px; border-radius:50%; background:#666;
    transition: background .3s;
  }
  .dot.connected { background:#4ade80; }
  .dot.disconnected { background:#f87171; }

  /* Search bar */
  .search-wrap {
    position: sticky; top:57px; z-index:9;
    background: #12121f;
    border-bottom: 1px solid #2a2a4a;
    padding: 10px 20px;
    display: flex; gap:8px; align-items: center;
  }
  .search-wrap input {
    flex:1;
    background: #1e1e30; border:1px solid #333; border-radius:8px;
    color:#e0e0e0; padding:9px 14px; font-size:14px;
    outline:none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color:#7eb8ff; }
  .search-wrap button {
    background: #2a2a4a; border:none; color:#e0e0e0;
    padding:9px 14px; border-radius:8px; cursor:pointer; font-size:14px;
    transition: background .2s;
  }
  .search-wrap button:hover { background:#3a3a5a; }
  .search-wrap .clear-search {
    background: transparent; color:#888; font-size:18px; padding:9px 10px;
  }
  .search-wrap .clear-search:hover { color:#f87171; }
  .search-status {
    font-size:12px; color:#888; white-space:nowrap;
  }
  main {
    max-width: 780px; margin:0 auto; padding:16px 20px 40px;
    display:flex; flex-direction:column; gap:10px;
  }
  .card {
    background: #1e1e30;
    border-radius: 10px;
    padding: 14px 18px;
    border-left: 4px solid #333;
    animation: slideIn .3s ease;
    transition: background .2s;
  }
  .card.type-new    { border-left-color: #4ade80; }
  .card.type-edit   { border-left-color: #60a5fa; }
  .card.type-delete { border-left-color: #f87171; background:#2a1a1a; }
  .card .meta {
    display:flex; align-items:center; gap:10px;
    font-size:12px; color:#888; margin-bottom:6px;
  }
  .card .meta .badge {
    font-size:10px; font-weight:700; text-transform:uppercase;
    padding:2px 7px; border-radius:4px;
  }
  .badge.new    { background:#14532d; color:#4ade80; }
  .badge.edit   { background:#1e3a5f; color:#60a5fa; }
  .badge.delete { background:#5f1a1a; color:#f87171; }
  .card .content {
    font-size:14px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word;
    color:#d0d0d0;
  }
  .card .content a { color:#7eb8ff; }
  mark {
    background:#facc15; color:#000; padding:1px 3px; border-radius:2px;
  }
  .empty { text-align:center; padding:60px 20px; color:#555; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .strike { text-decoration:line-through; color:#666; }
  .footer {
    text-align:center; padding:20px; color:#444; font-size:12px;
  }
</style>
</head>
<body>

<header>
  <h1>💬 Saved Messages — Live</h1>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Search saved messages (no accent needed)...">
  <button id="search-btn" title="Search">🔍</button>
  <button class="clear-search" id="clear-search" title="Clear search" style="display:none">✕</button>
  <span class="search-status" id="search-status"></span>
</div>

<main id="feed">
  <div class="empty">
    <div class="icon">📭</div>
    <div>Waiting for messages...</div>
  </div>
</main>

<div class="footer">Real-time via Telegram User API + WebSocket</div>

<script>
const feed = document.getElementById('feed');
const dot = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const empty = feed.querySelector('.empty');
let count = 0;

// ── Search state ──────────────────────────────────────────────────────────
let searchMode = false;
let searchQuery = '';
let searchOffset = 0;
let totalSearched = 0;
let liveBuffer = [];  // buffered live msgs while in search mode

const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const clearBtn = document.getElementById('clear-search');
const searchStatus = document.getElementById('search-status');

searchBtn.addEventListener('click', () => doSearch());
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});
clearBtn.addEventListener('click', clearSearch);

function doSearch(loadMore = false) {
  const q = searchInput.value.trim();
  if (!q) return;

  if (!loadMore) {
    searchMode = true;
    searchQuery = q;
    searchOffset = 0;
    totalSearched = 0;
    liveBuffer = [];
    clearBtn.style.display = 'inline-block';

    // Clear feed for results
    feed.innerHTML = '';
    count = 0;
  }

  searchStatus.textContent = 'Searching...';
  fetchResults();
}

async function fetchResults() {
  if (!searchMode) return;

  const params = new URLSearchParams({ q: searchQuery });
  if (searchOffset) params.set('offset', searchOffset);

  try {
    const res = await fetch(`/api/search?${params}`);
    const data = await res.json();

    if (data.error) {
      searchStatus.textContent = data.error;
      return;
    }

    totalSearched = data.searched;

    // Build header label
    const modeLabel = data.mode === 'server' ? '⚡ server' : data.mode === 'deep' ? '🐢 deep scan' : '';

    if (data.results.length > 0) {
      searchStatus.textContent = `${data.results.length} result(s) · ${modeLabel}`;

      // Remove existing load-more button if any
      const oldBtn = document.getElementById('load-more-btn');
      if (oldBtn) oldBtn.remove();

      // Add a header card
      const headerCard = document.createElement('div');
      headerCard.className = 'card';
      headerCard.style.borderLeftColor = '#facc15';
      headerCard.innerHTML = `
        <div class="meta"><span class="badge" style="background:#3b2f00;color:#facc15">search</span><span>"${escHtml(searchQuery)}"</span><span style="margin-left:auto;color:#888;font-size:11px">${modeLabel}</span></div>
        <div class="content">${data.results.length} match(es)</div>
      `;
      feed.appendChild(headerCard);

      data.results.forEach(addCard);

      // Load more button
      if (data.has_more) {
        const btn = document.createElement('button');
        btn.id = 'load-more-btn';
        btn.textContent = 'Load more...';
        btn.style.cssText = 'display:block;width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #333;background:#1e1e30;color:#ccc;cursor:pointer;font-size:14px';
        btn.addEventListener('click', () => {
          searchOffset = data.next_offset;
          doSearch(true);
        });
        feed.appendChild(btn);
      }
    } else if (data.has_more) {
      // No results yet, more to scan (deep scan mode)
      searchOffset = data.next_offset;
      searchStatus.textContent = `Deep scanning... scanned ${totalSearched} msgs`;
      await fetchResults();  // auto-continue
    } else {
      // Exhausted
      searchStatus.textContent = `No results for "${searchQuery}" (${modeLabel})`;
      const emptyCard = document.createElement('div');
      emptyCard.className = 'empty';
      emptyCard.innerHTML = `<div class="icon">🔍</div><div>No messages match "${escHtml(searchQuery)}"</div><div style="font-size:12px;color:#555;margin-top:6px">Searched ${totalSearched} messages</div>`;
      feed.appendChild(emptyCard);
    }
  } catch (err) {
    searchStatus.textContent = 'Search error: ' + err.message;
  }
}

function clearSearch() {
  searchMode = false;
  searchQuery = '';
  searchOffset = 0;

  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchStatus.textContent = '';

  // Restore live feed
  feed.innerHTML = '';
  count = 0;
  if (liveBuffer.length === 0) {
    feed.appendChild(document.createElement('div'));
    feed.lastChild.className = 'empty';
    feed.lastChild.innerHTML = '<div class="icon">📭</div><div>Waiting for messages...</div>';
  }
  liveBuffer.forEach(addCard);
  liveBuffer = [];
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Vietnamese accent normalization (JS) ──────────────────────────────────
function vnNormalize(text) {
  // đ/Đ don't decompose via NFD — handle first
  text = text.replace(/đ/g, 'd').replace(/Đ/g, 'd');
  return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

// ── Highlight matching words in text ──────────────────────────────────────
function highlightMatches(text, query) {
  if (!query || !text) return escHtml(text);

  const escaped = escHtml(text);
  const q = query.trim();
  if (!q) return escaped;

  // Build regex: split query into words, match case-insensitive with accent-insensitivity
  const words = q.split(/\s+/).filter(w => w.length > 0);

  // Approach: find all positions in the original text where normalized text matches
  const normText = vnNormalize(text);
  const normQuery = vnNormalize(q);

  // Collect all match spans
  const spans = [];

  // Try whole phrase first
  let idx = normText.indexOf(normQuery, 0);
  while (idx !== -1) {
    spans.push([idx, idx + normQuery.length]);
    idx = normText.indexOf(normQuery, idx + 1);
  }

  // Also try individual words
  for (const word of words) {
    const nw = vnNormalize(word);
    if (!nw || nw === normQuery) continue; // already matched
    idx = normText.indexOf(nw, 0);
    while (idx !== -1) {
      // Check not overlapping with existing spans
      const end = idx + nw.length;
      const overlaps = spans.some(([s, e]) => idx < e && end > s);
      if (!overlaps) {
        spans.push([idx, end]);
      }
      idx = normText.indexOf(nw, idx + 1);
    }
  }

  if (spans.length === 0) return escaped;

  // Sort and deduplicate
  spans.sort((a, b) => a[0] - b[0]);

  // Escape the original text, then insert <mark> tags at correct positions
  // Since we escaped already, positions in `escaped` don't match original positions
  // Strategy: build result char by char from original, escaping and marking inline
  let result = '';
  let pos = 0;
  for (const [start, end] of spans) {
    // Append non-highlighted part (before this span)
    result += escHtml(text.slice(pos, start));
    // Append highlighted part
    result += '<mark>' + escHtml(text.slice(start, end)) + '</mark>';
    pos = end;
  }
  result += escHtml(text.slice(pos));

  return result;
}

// ── WebSocket ─────────────────────────────────────────────────────────────

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    dot.className = 'dot connected';
    statusText.textContent = 'Live';
  };

  ws.onclose = () => {
    dot.className = 'dot disconnected';
    statusText.textContent = 'Reconnecting...';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'history') {
      if (!searchMode) {
        data.messages.forEach(addCard);
      }
      return;
    }
    if (searchMode) {
      liveBuffer.push(data);
      if (liveBuffer.length > 50) liveBuffer.shift();
      return;
    }
    addCard(data);
  };
}

function timeAgo(iso) {
  const d = new Date(iso);
  const now = new Date();
  const s = Math.floor((now - d) / 1000);
  if (s < 10) return 'just now';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return d.toLocaleString();
}

function addCard(data) {
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = `card type-${data.type}`;

  const meta = document.createElement('div');
  meta.className = 'meta';

  const badge = document.createElement('span');
  badge.className = `badge ${data.type}`;
  badge.textContent = data.type;

  const time = document.createElement('span');
  time.textContent = data.date ? timeAgo(data.date) : '';

  const idSpan = document.createElement('span');
  idSpan.textContent = `#${data.id}`;
  idSpan.style.marginLeft = 'auto';

  meta.appendChild(badge);
  meta.appendChild(time);
  meta.appendChild(idSpan);

  const content = document.createElement('div');
  content.className = 'content';

  if (data.type === 'delete') {
    content.innerHTML = `<span class="strike">Deleted ${data.ids?.length || 0} message(s): ${(data.ids||[]).join(', ')}</span>`;
  } else {
    // Linkify
    let text = (data.text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    text = text.replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank">$1</a>');
    // Highlight matches if in search mode
    if (searchMode && searchQuery) {
      // Decode HTML entities back for highlightMatches (it will re-escape)
      const decoder = document.createElement('textarea');
      decoder.innerHTML = text;
      text = decoder.value;
      text = highlightMatches(text, searchQuery);
      // Re-linkify after highlight
      text = text.replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank">$1</a>');
    }
    content.innerHTML = text || (data.media ? `📎 ${data.media}` : '<i>empty</i>');
  }

  card.appendChild(meta);
  card.appendChild(content);
  feed.prepend(card);

  // Keep max 200 cards in DOM
  count++;
  if (count > 200) {
    feed.lastElementChild.remove();
    count--;
  }

  // Scroll to top to show newest
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

connect();
</script>

</body>
</html>
