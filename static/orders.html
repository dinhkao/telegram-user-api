<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Shared DB Viewer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size:13px; margin:0; padding:8px 12px; color:#222; background:#fff; }
  h1 { font-size:16px; margin:0 0 8px 0; }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .toolbar input, .toolbar select { padding:4px 8px; font-size:13px; border:1px solid #999; border-radius:3px; }
  .toolbar button { padding:4px 10px; font-size:13px; cursor:pointer; }
  .info { color:#666; margin-bottom:6px; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th, td { padding:4px 6px; text-align:left; border-bottom:1px solid #ddd; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  th { background:#f5f5f5; position:sticky; top:0; font-weight:600; }
  tr:hover td { background:#fafafa; }
  .num { text-align:right; }
  .badge { display:inline-block; padding:1px 5px; border-radius:3px; font-size:11px; }
  .badge-done { background:#d4edda; color:#155724; }
  .badge-pending { background:#fff3cd; color:#856404; }
  .steps { font-size:11px; color:#888; }
  .steps b { color:#333; }
  .pagination { display:flex; gap:4px; margin-top:10px; align-items:center; }
  .pagination button { padding:4px 10px; font-size:13px; cursor:pointer; }
  .pagination span { padding:0 8px; }
  a { color:#06c; text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>

<h1>📋 Orders — Shared DB Viewer</h1>

<div class="toolbar">
  <input id="search" type="text" placeholder="Search customer or key..." style="width:200px;">
  <select id="status-filter">
    <option value="">All statuses</option>
    <option value="Done">Done</option>
    <option value="Pending">Pending</option>
    <option value="Cancelled">Cancelled</option>
  </select>
  <button onclick="loadPage(1)">Search</button>
  <span style="margin:0 10px;color:#ccc">|</span>
  <a href="/">Saved Messages</a>
  <a href="/donhang">#don_hang</a>
</div>

<div class="info" id="info">Loading...</div>

<table id="table">
  <thead>
    <tr>
      <th style="width:80px">Thread</th>
      <th style="width:140px">Customer</th>
      <th style="width:100px">Total</th>
      <th style="width:80px">Status</th>
      <th style="width:110px">Steps</th>
      <th style="width:110px">Date</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="pagination" id="pager"></div>

<script>
let currentPage = 1;
const limit = 50;

function loadPage(page) {
  currentPage = page;
  const search = document.getElementById('search').value.trim();
  const status = document.getElementById('status-filter').value;
  const params = new URLSearchParams({ page, limit, search, status });

  fetch('/api/orders?' + params)
    .then(r => r.json())
    .then(data => {
      document.getElementById('info').textContent =
        `Showing ${data.orders.length} of ${data.total} orders · Page ${data.page}/${data.total_pages}`;

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (!data.orders.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#999;">No orders found</td></tr>';
      }

      data.orders.forEach(o => {
        const steps = [];
        if (o.soan) steps.push('Soạn');
        if (o.giao) steps.push('Giao');
        if (o.nop) steps.push('Nộp');
        if (o.nhan) steps.push('Nhận');
        const stepsHtml = steps.length
          ? '<span class="steps">' + steps.map(s => '<b>' + s + '</b>').join(' ') + '</span>'
          : '<span class="steps" style="color:#ccc">—</span>';

        const statusBadge = o.status === 'Done'
          ? '<span class="badge badge-done">Done</span>'
          : o.status
            ? '<span class="badge badge-pending">' + o.status + '</span>'
            : '<span style="color:#999">—</span>';

        const totalDisplay = o.total
          ? parseInt(o.total).toLocaleString('vi-VN') + '₫'
          : '—';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><a href="https://t.me/c/${String(o.channel_id).replace('-100','')}/${o.message_id || o.thread_id}" target="_blank">${o.thread_id || '—'}</a></td>
          <td title="${o.customer || ''}">${o.customer || '—'}</td>
          <td class="num">${totalDisplay}</td>
          <td>${statusBadge}</td>
          <td>${stepsHtml}</td>
          <td>${o.date || '—'}</td>
        `;
        tbody.appendChild(tr);
      });

      renderPager(data.page, data.total_pages);
    })
    .catch(err => {
      document.getElementById('info').textContent = 'Error: ' + err.message;
    });
}

function renderPager(page, totalPages) {
  const pager = document.getElementById('pager');
  pager.innerHTML = '';

  if (totalPages <= 1) return;

  const addBtn = (label, p, disabled) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.disabled = disabled;
    btn.onclick = () => loadPage(p);
    return btn;
  };

  pager.appendChild(addBtn('« First', 1, page === 1));
  pager.appendChild(addBtn('‹ Prev', page - 1, page === 1));

  const span = document.createElement('span');
  span.textContent = `Page ${page} / ${totalPages}`;
  pager.appendChild(span);

  pager.appendChild(addBtn('Next ›', page + 1, page === totalPages));
  pager.appendChild(addBtn('Last »', totalPages, page === totalPages));
}

// Search on Enter
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadPage(1);
});
document.getElementById('status-filter').addEventListener('change', () => loadPage(1));

// Initial load
loadPage(1);
</script>

</body>
</html>
